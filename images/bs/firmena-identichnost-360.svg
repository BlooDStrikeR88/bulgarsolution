<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
	<defs>
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#f6f2ff"/>
			<stop offset="100%" stop-color="#e6f2ff"/>
		</linearGradient>
		<linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"  stop-color="#9357cc"/>
			<stop offset="50%" stop-color="#2989d8"/>
			<stop offset="100%" stop-color="#2cc99d"/>
		</linearGradient>
		<linearGradient id="darkCard" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"  stop-color="#142c44"/>
			<stop offset="100%" stop-color="#1d3f63"/>
		</linearGradient>
		<filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
			<feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1a3a5e" flood-opacity="0.22"/>
		</filter>
		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
			<feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1a3a5e" flood-opacity="0.16"/>
		</filter>
	</defs>

	<rect width="800" height="600" fill="url(#bg)"/>

	<!-- Decorative background shapes -->
	<circle cx="60"  cy="60"  r="140" fill="url(#brand)" opacity="0.08"/>
	<circle cx="760" cy="560" r="180" fill="url(#brand)" opacity="0.08"/>
	<circle cx="700" cy="120" r="50"  fill="url(#brand)" opacity="0.10"/>

	<!-- HEADER: monogram + brand wordmark -->
	<g transform="translate(110, 130)">
		<circle cx="0" cy="0" r="58" fill="url(#brand)" filter="url(#cardShadow)"/>
		<text x="0" y="18" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="58" fill="#ffffff">B</text>
	</g>
	<text x="200" y="120" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="38" fill="#142c44" letter-spacing="-1">BRAND</text>
	<text x="200" y="148" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="20" fill="#2989d8" letter-spacing="3">IDENTITY · 360°</text>
	<rect x="200" y="162" width="140" height="3" rx="1.5" fill="url(#brand)"/>

	<!-- Business card (back, tilted) -->
	<g transform="translate(540, 130) rotate(-7)" filter="url(#cardShadow)">
		<rect x="-130" y="-78" width="260" height="156" rx="12" fill="#ffffff"/>
		<rect x="-130" y="-78" width="260" height="46" rx="12" fill="url(#brand)"/>
		<rect x="-130" y="-50" width="260" height="14" fill="url(#brand)"/>
		<circle cx="-95" cy="6" r="14" fill="url(#brand)"/>
		<rect x="-72" y="0"  width="100" height="6" rx="3" fill="#142c44"/>
		<rect x="-72" y="14" width="130" height="4" rx="2" fill="#9aa8bf"/>
		<rect x="-115" y="44" width="90" height="4" rx="2" fill="#5a6b85"/>
		<rect x="-115" y="56" width="70" height="4" rx="2" fill="#9aa8bf"/>
	</g>

	<!-- Business card (front, dark) -->
	<g transform="translate(620, 230) rotate(8)" filter="url(#cardShadow)">
		<rect x="-130" y="-78" width="260" height="156" rx="12" fill="url(#darkCard)"/>
		<text x="-110" y="-32" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="20" fill="#ffffff">Иван Петров</text>
		<text x="-110" y="-12" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="10" fill="#9cdfff" letter-spacing="2.5">CREATIVE DIRECTOR</text>
		<line x1="-110" y1="6" x2="-50" y2="6" stroke="url(#brand)" stroke-width="2.5"/>
		<text x="-110" y="32" font-family="Poppins, Arial, sans-serif" font-weight="400" font-size="10" fill="#9aa8bf">+359 89 524 5290</text>
		<text x="-110" y="50" font-family="Poppins, Arial, sans-serif" font-weight="400" font-size="10" fill="#9aa8bf">hello@brand.bg</text>
		<circle cx="92" cy="-46" r="22" fill="none" stroke="url(#brand)" stroke-width="2"/>
		<text x="92" y="-40" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="22" fill="url(#brand)">B</text>
	</g>

	<!-- COLOR PALETTE -->
	<g transform="translate(70, 360)">
		<text x="0" y="-12" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="11" fill="#2989d8" letter-spacing="3">PALETTE</text>
		<circle cx="22"  cy="22" r="22" fill="#9357cc" filter="url(#softShadow)"/>
		<circle cx="72"  cy="22" r="22" fill="#2989d8" filter="url(#softShadow)"/>
		<circle cx="122" cy="22" r="22" fill="#2cc99d" filter="url(#softShadow)"/>
		<circle cx="172" cy="22" r="22" fill="#142c44" filter="url(#softShadow)"/>
		<circle cx="222" cy="22" r="22" fill="#ffffff" stroke="#e0e6f0" stroke-width="1.5" filter="url(#softShadow)"/>
		<text x="22"  y="60" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#5a6b85">#9357CC</text>
		<text x="72"  y="60" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#5a6b85">#2989D8</text>
		<text x="122" y="60" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#5a6b85">#2CC99D</text>
		<text x="172" y="60" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#5a6b85">#142C44</text>
		<text x="222" y="60" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#5a6b85">#FFFFFF</text>
	</g>

	<!-- TYPOGRAPHY SAMPLE -->
	<g transform="translate(380, 360)">
		<text x="0" y="-12" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="11" fill="#2989d8" letter-spacing="3">TYPOGRAPHY</text>
		<text x="0"   y="42" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="56" fill="url(#brand)">Aa</text>
		<text x="100" y="42" font-family="Lato, Arial, sans-serif" font-weight="300" font-size="56" fill="#142c44">Aa</text>
		<text x="0"   y="62" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="9" fill="#5a6b85" letter-spacing="2">POPPINS</text>
		<text x="100" y="62" font-family="Lato, Arial, sans-serif" font-size="9" fill="#5a6b85" letter-spacing="2">LATO</text>
	</g>

	<!-- LOGO MARKS row -->
	<g transform="translate(70, 478)">
		<text x="0" y="0" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="11" fill="#2989d8" letter-spacing="3">MARKS</text>
		<g transform="translate(22, 36)" filter="url(#softShadow)">
			<circle r="22" fill="url(#brand)"/>
			<text y="7" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="20" fill="#ffffff">B</text>
		</g>
		<g transform="translate(80, 36)" filter="url(#softShadow)">
			<circle r="22" fill="#ffffff"/>
			<circle r="22" fill="none" stroke="url(#brand)" stroke-width="2.5"/>
			<text y="7" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="20" fill="#142c44">B</text>
		</g>
		<g transform="translate(138, 36)" filter="url(#softShadow)">
			<rect x="-22" y="-22" width="44" height="44" rx="10" fill="#142c44"/>
			<text y="7" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="20" fill="url(#brand)">B</text>
		</g>
		<g transform="translate(196, 36)" filter="url(#softShadow)">
			<rect x="-22" y="-22" width="44" height="44" rx="10" fill="#ffffff"/>
			<rect x="-22" y="-22" width="44" height="44" rx="10" fill="none" stroke="#e0e6f0"/>
			<text y="7" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="20" fill="#142c44">B</text>
		</g>
	</g>

	<!-- DIGITAL BRANDBOOK widget -->
	<g transform="translate(380, 478)" filter="url(#cardShadow)">
		<rect x="0"  y="0" width="340" height="80" rx="12" fill="#ffffff"/>
		<rect x="0"  y="0" width="6"   height="80" fill="url(#brand)"/>
		<text x="22" y="24" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="14" fill="#142c44">Digital Brandbook</text>
		<text x="22" y="42" font-family="Poppins, Arial, sans-serif" font-weight="400" font-size="10" fill="#5a6b85">Living visual system · v2.4</text>
		<rect x="22"  y="54" width="54" height="14" rx="7" fill="#eef0fa"/>
		<text x="49"  y="64" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="8" fill="#9357cc">LOGO</text>
		<rect x="82"  y="54" width="54" height="14" rx="7" fill="#eef0fa"/>
		<text x="109" y="64" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="8" fill="#2989d8">COLOR</text>
		<rect x="142" y="54" width="54" height="14" rx="7" fill="#eef0fa"/>
		<text x="169" y="64" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="8" fill="#2cc99d">TYPE</text>
		<rect x="202" y="54" width="62" height="14" rx="7" fill="#eef0fa"/>
		<text x="233" y="64" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="8" fill="#142c44">SOCIAL</text>
		<g transform="translate(304, 40)">
			<circle r="22" fill="url(#brand)"/>
			<path d="M-7,-2 L-2,4 L8,-6" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
		</g>
	</g>
</svg>
