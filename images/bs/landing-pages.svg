<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
	<defs>
		<linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"  stop-color="#eef5ff"/>
			<stop offset="100%" stop-color="#fff4ec"/>
		</linearGradient>
		<linearGradient id="brand2" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"  stop-color="#9357cc"/>
			<stop offset="50%" stop-color="#2989d8"/>
			<stop offset="100%" stop-color="#2cc99d"/>
		</linearGradient>
		<linearGradient id="cta" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%"  stop-color="#ff8a00"/>
			<stop offset="100%" stop-color="#ff5722"/>
		</linearGradient>
		<linearGradient id="heroOrb" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"  stop-color="#9357cc"/>
			<stop offset="100%" stop-color="#2989d8"/>
		</linearGradient>
		<filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
			<feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1a3a5e" flood-opacity="0.22"/>
		</filter>
		<filter id="floatShadow" x="-20%" y="-20%" width="140%" height="160%">
			<feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a3a5e" flood-opacity="0.18"/>
		</filter>
	</defs>

	<rect width="800" height="600" fill="url(#bg2)"/>

	<!-- Decorative bg circles -->
	<circle cx="710" cy="80"  r="110" fill="url(#brand2)" opacity="0.10"/>
	<circle cx="100" cy="540" r="160" fill="url(#brand2)" opacity="0.08"/>
	<circle cx="50"  cy="80"  r="40"  fill="url(#cta)"    opacity="0.12"/>

	<!-- Browser window -->
	<g filter="url(#winShadow)">
		<rect x="80"  y="70"  width="640" height="450" rx="14" fill="#ffffff"/>
		<rect x="80"  y="70"  width="640" height="40"  rx="14" fill="#f4f7fb"/>
		<rect x="80"  y="92"  width="640" height="18"  fill="#f4f7fb"/>

		<!-- traffic lights -->
		<circle cx="105" cy="91" r="6" fill="#ff5f57"/>
		<circle cx="125" cy="91" r="6" fill="#ffbd2e"/>
		<circle cx="145" cy="91" r="6" fill="#28c840"/>

		<!-- address bar -->
		<rect x="180" y="82" width="380" height="18" rx="9" fill="#ffffff" stroke="#e3e8f0"/>
		<circle cx="195" cy="91" r="3" fill="#2cc99d"/>
		<text x="206" y="95" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#5a6b85">https://yourbrand.bg/landing</text>

		<!-- HERO SECTION -->
		<rect x="80" y="110" width="640" height="226" fill="#fafbff"/>

		<!-- left text column -->
		<rect x="120" y="148" width="56" height="6" rx="3" fill="url(#brand2)"/>
		<text x="120" y="194" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="32" fill="#142c44">Convert</text>
		<text x="120" y="226" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="32" fill="url(#brand2)">visitors into</text>
		<text x="120" y="258" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="32" fill="#142c44">customers.</text>
		<rect x="120" y="278" width="320" height="6" rx="3" fill="#9aa8bf"/>
		<rect x="120" y="292" width="280" height="6" rx="3" fill="#9aa8bf"/>

		<!-- CTA button -->
		<rect x="120" y="310" width="170" height="42" rx="21" fill="url(#cta)"/>
		<text x="205" y="337" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="13" fill="#ffffff" letter-spacing="1">START NOW →</text>
		<rect x="306" y="310" width="120" height="42" rx="21" fill="none" stroke="#142c44" stroke-width="1.5"/>
		<text x="366" y="337" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="600" font-size="12" fill="#142c44">Виж демо</text>

		<!-- right hero illustration -->
		<g transform="translate(580, 220)">
			<circle r="86" fill="url(#brand2)" opacity="0.16"/>
			<circle r="60" fill="url(#brand2)" opacity="0.28"/>
			<circle r="36" fill="url(#heroOrb)"/>
			<path d="M -10,-4 L -3,4 L 12,-12" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
			<!-- Decorative ticks -->
			<rect x="-92" y="-46" width="20" height="4" rx="2" fill="#9357cc" opacity="0.7"/>
			<rect x="-96" y="-30" width="14" height="4" rx="2" fill="#2989d8" opacity="0.7"/>
			<rect x="74"  y="34"  width="20" height="4" rx="2" fill="#2cc99d" opacity="0.7"/>
			<rect x="78"  y="50"  width="14" height="4" rx="2" fill="#9357cc" opacity="0.7"/>
		</g>

		<!-- STATS row (floating cards) -->
		<g filter="url(#floatShadow)" transform="translate(0, 0)">
			<rect x="120" y="358" width="180" height="64" rx="12" fill="#ffffff"/>
			<rect x="132" y="372" width="40"  height="6" rx="3" fill="url(#brand2)"/>
			<text x="132" y="408" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="22" fill="#142c44">+247%</text>
			<text x="200" y="396" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="9" fill="#5a6b85" letter-spacing="1">CONVERSION</text>
			<text x="200" y="410" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="9" fill="#5a6b85" letter-spacing="1">RATE</text>
		</g>
		<g filter="url(#floatShadow)">
			<rect x="310" y="358" width="180" height="64" rx="12" fill="#ffffff"/>
			<rect x="322" y="372" width="40"  height="6" rx="3" fill="#2cc99d"/>
			<text x="322" y="408" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="22" fill="#142c44">12.4k</text>
			<text x="385" y="396" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="9" fill="#5a6b85" letter-spacing="1">UNIQUE</text>
			<text x="385" y="410" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="9" fill="#5a6b85" letter-spacing="1">VISITORS</text>
		</g>
		<g filter="url(#floatShadow)">
			<rect x="500" y="358" width="180" height="64" rx="12" fill="#ffffff"/>
			<rect x="512" y="372" width="40"  height="6" rx="3" fill="url(#cta)"/>
			<text x="512" y="408" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="22" fill="#142c44">2.1s</text>
			<text x="568" y="396" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="9" fill="#5a6b85" letter-spacing="1">PAGE</text>
			<text x="568" y="410" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="9" fill="#5a6b85" letter-spacing="1">LOAD</text>
		</g>

		<!-- Form / footer area -->
		<g transform="translate(0, 0)">
			<rect x="120" y="442" width="260" height="58" rx="10" fill="#f4f7fb"/>
			<text x="138" y="464" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="10" fill="#5a6b85">Email address</text>
			<rect x="138" y="474" width="180" height="4" rx="2" fill="#9aa8bf"/>
			<rect x="138" y="484" width="120" height="4" rx="2" fill="#9aa8bf"/>

			<rect x="396" y="442" width="170" height="58" rx="29" fill="url(#brand2)"/>
			<text x="481" y="476" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="13" fill="#ffffff" letter-spacing="1.5">SUBSCRIBE</text>

			<rect x="582" y="442" width="98" height="58" rx="10" fill="#ffffff" stroke="#e9eef7"/>
			<circle cx="601" cy="471" r="9" fill="#3b5998"/>
			<text x="601" y="475" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="11" fill="#ffffff">f</text>
			<circle cx="630" cy="471" r="9" fill="#1da1f2"/>
			<path d="M626,468 q3,-2 5,0 q-1,3 -5,3 z" fill="#ffffff"/>
			<circle cx="659" cy="471" r="9" fill="url(#brand2)"/>
			<rect x="654.5" y="466.5" width="9" height="9" rx="2" fill="none" stroke="#ffffff" stroke-width="1.4"/>
		</g>
	</g>

	<!-- Conversion targeting ring around CTA -->
	<g transform="translate(205, 331)">
		<circle r="86" fill="none" stroke="url(#cta)" stroke-width="2" stroke-dasharray="5 5" opacity="0.55"/>
		<circle r="62" fill="none" stroke="url(#cta)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4"/>
	</g>

	<!-- Mouse cursor click on CTA -->
	<g transform="translate(232, 348)" filter="url(#floatShadow)">
		<path d="M0,0 L0,22 L6,17 L11,28 L15,26 L10,15 L18,15 Z" fill="#142c44" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
	</g>
	<!-- Click ripple -->
	<circle cx="230" cy="348" r="14" fill="none" stroke="url(#cta)" stroke-width="2" opacity="0.7"/>
	<circle cx="230" cy="348" r="22" fill="none" stroke="url(#cta)" stroke-width="1.5" opacity="0.4"/>
</svg>
